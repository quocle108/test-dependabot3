# =============================================================================
# Dependabot Configuration — v1
# =============================================================================
#
# Single npm block (Dependabot requires unique package-ecosystem + directory).
# Groups separate security updates (by severity) and version updates (patch only).
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
# =============================================================================

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    reviewers:
      - "quocle108"
    assignees:
      - "quocle108"
    labels:
      - "dependencies"
    # Ignore major/minor for version updates (not security updates)
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    groups:
      # --- Security Updates (3 groups by severity) ---
      # Case 1: Patch — auto-merge after CI passes
      security-patch-updates:
        applies-to: security-updates
        update-types:
          - "patch"
      # Case 2: Minor — reviewer merges manually
      security-minor-updates:
        applies-to: security-updates
        update-types:
          - "minor"
      # Case 3: Major — manual review + migration plan
      security-major-updates:
        applies-to: security-updates
        update-types:
          - "major"
      # Case 4: No fix — no PR created, tracked in Security tab alerts

      # --- Version Updates (patch only) ---
      version-patch-updates:
        applies-to: version-updates
        update-types:
          - "patch"
