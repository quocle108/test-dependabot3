# =============================================================================
# CI Pipeline
# =============================================================================
#
# Runs on every push/PR to main. This is the quality gate:
#   1. npm ci     — install exact pinned dependencies
#   2. npm test   — verify code works
#   3. npm audit  — check for known vulnerabilities
#
# All Dependabot PRs must pass this CI before they can be merged.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run audit
        run: npm audit --audit-level=high
        continue-on-error: true  # Don't fail CI — we expect vulnerabilities in this test project
